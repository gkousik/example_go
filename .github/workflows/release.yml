name: goreleaser

on:
  push:
    # run only on tags
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: self-hosted
    permissions:
      id-token: 'write' # Required for requesting the JWT
      contents: 'read' # Required for actions/checkout
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      -
        name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      -
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          # 'latest', 'v1', or 'v1.2.3'
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - 
        name: Make a file with a lot of repeated text
        run: |
          for i in {1..100000}; do echo -n 'foobar' >> foobar.txt; done
      - 
        name: Print pwd
        run: |
          pwd
      - 
        name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: foobar.txt
          compression-level: 9 # maximum compression
      - 
        name: Release to RBE
        uses: gkousik/actions-rbe-output@main
        with:
          name: go-release
          path: dist
          type: file
      - 
        name: Run Custom Sample Action
        id: custom-sample
        uses: ./sample-action
      - 
        name: Print Sample Action Output
        run: |
          echo "The custom action produced: ${{ steps.custom-sample.outputs.custom_result }}"
